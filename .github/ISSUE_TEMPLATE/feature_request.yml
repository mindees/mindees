name: Feature request
description: Suggest an idea or improvement
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Substantial features (new public API, new packages, architecture) go
        through the [RFC process](https://github.com/mindees/mindees/blob/main/rfcs/README.md).
        Use this template for smaller ideas and improvements.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
