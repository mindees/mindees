name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo. No write scope on PR runs.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # mid-2026: Node 24 = Active LTS ("Krypton"), 22 = Maintenance LTS ("Jod").
        node-version: [22, 24]
    steps:
      # Third-party actions are pinned to full commit SHAs (tags are mutable).
      # The trailing comment records the human-readable version. Keep in sync via Dependabot.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Install pnpm BEFORE setup-node so `cache: pnpm` can find the binary.
      # action-setup reads the pnpm version from package.json "packageManager".
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check version sync
        run: pnpm run check:versions

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Check package exports
        run: pnpm run check:exports

      - name: Smoke CLI
        run: pnpm run smoke:cli

      - name: Test
        run: pnpm run test
