name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# No top-level permissions: each job grants only what it needs (below).
permissions: {}

jobs:
  release:
    name: Release
    # Only run on the canonical repo; forks won't have publish secrets.
    if: github.repository == 'mindees/mindees'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version commit/tags + create GitHub releases
      pull-requests: write # open the "version packages" PR
      id-token: write # npm provenance / OIDC (optional)
    steps:
      # Third-party actions are pinned to full commit SHAs (tags are mutable).
      # This job is privileged (holds NPM_TOKEN), so SHA-pinning is mandatory here.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Opens/updates a "version packages" PR when changesets are pending;
      # publishes to npm when that PR is merged.
      # NOTE: requires the NPM_TOKEN secret to be configured before releases.
      - name: Create release PR or publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
