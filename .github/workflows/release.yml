name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# No top-level permissions: the job grants only what it needs (below).
permissions: {}

jobs:
  release:
    name: Release
    # Only run on the canonical repo; forks won't have publish access.
    if: github.repository == 'mindees/mindees'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version commit/tags
      pull-requests: write # open the "version packages" PR
      id-token: write # npm OIDC trusted publishing + provenance (no long-lived token)
    steps:
      # Third-party actions are pinned to full commit SHAs (tags are mutable).
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # This step has TWO mutually-exclusive modes, decided by whether changesets
      # are pending on the pushed commit:
      #
      #  1. Changesets pending → it opens/updates a "version packages" PR.
      #     `version-packages` bumps package.json AND syncs the source VERSION
      #     constants (scripts/sync-versions.mjs). Nothing is published.
      #  2. No changesets pending (the version PR was just merged, consuming them)
      #     → it runs `publish` (`pnpm run release`) to publish to npm.
      #
      # So the *merge of a version packages PR* is the single, deliberate trigger
      # for the first (irreversible) publish. `pnpm release` still refuses to publish
      # 0.0.0 (`sync-versions.mjs --assert-released`) and runs the build + exports +
      # packed-artifact readiness gates before `changeset publish`. See RELEASING.md.
      #
      # Auth is an automation NPM_TOKEN. We would prefer OIDC trusted publishing
      # (id-token: write is kept below for provenance + a future switch back), but
      # `changeset publish` shells out to `pnpm publish`, and pnpm 11's OIDC trusted
      # publishing is currently broken — it sends no credentials and npm returns a
      # misleading 404 (pnpm/pnpm#11513; fix PR #11526 is not in a released pnpm yet).
      # A granular NPM_TOKEN authenticates reliably with pnpm 11. Revisit OIDC once
      # pnpm ships the fix.
      - name: Version packages PR, or publish when versions are real
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
