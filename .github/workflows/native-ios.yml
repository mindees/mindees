name: Native iOS host

# Compiles + tests the reference iOS host (examples/native-hosts/ios) so the
# "authored" Swift code is actually verified by CI — the project's dev/CI has no
# macOS locally, so this macOS runner is the source of truth for it. Path-filtered
# so it only runs when the iOS host (or this workflow) changes; not a required check.

on:
  push:
    branches: [main]
    paths:
      - 'examples/native-hosts/ios/**'
      - '.github/workflows/native-ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/native-hosts/ios/**'
      - '.github/workflows/native-ios.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-host:
    name: iOS host (swift test + iOS compile)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: examples/native-hosts/ios
    steps:
      # Third-party actions pinned to full commit SHAs (see CI workflow).
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Swift version
        run: swift --version

      # Builds + runs the device-free core (Codable model, strict host, ModelRenderer)
      # on macOS. UIKitRenderer is excluded here via `#if canImport(UIKit)`.
      - name: Build (macOS)
        run: swift build

      - name: Test (macOS)
        run: swift test

      # Compile the full package — including UIKitRenderer — for the iOS SDK, where
      # UIKit is available. This is the "the iOS host compiles" check.
      - name: Compile for iOS
        run: xcodebuild build -scheme MindeesNativeHost -destination 'generic/platform=iOS' -skipPackagePluginValidation

      # Create a concrete simulator because macos-latest images can expose only the
      # generic "Any iOS Simulator Device" placeholder until a device is created.
      - name: Prepare iOS Simulator
        id: ios-simulator
        run: |
          set -euo pipefail
          DEVICE_TYPE_ID="$(python3 - <<'PY'
          import json
          import subprocess

          data = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"], text=True)
          )["devicetypes"]
          iphones = [d for d in data if d.get("name", "").startswith("iPhone")]
          if not iphones:
              raise SystemExit("No iPhone simulator device types are installed")

          preferred = [
              "com.apple.CoreSimulator.SimDeviceType.iPhone-16",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-14",
          ]
          by_id = {d["identifier"]: d for d in iphones}
          for identifier in preferred:
              if identifier in by_id:
                  print(identifier)
                  break
          else:
              print(iphones[-1]["identifier"])
          PY
          )"
          RUNTIME_ID="$(python3 - <<'PY'
          import json
          import subprocess

          def version_key(runtime):
              parts = []
              for part in runtime.get("version", "0").split("."):
                  try:
                      parts.append(int(part))
                  except ValueError:
                      parts.append(0)
              return parts

          data = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"], text=True)
          )["runtimes"]
          runtimes = [
              r for r in data
              if r.get("isAvailable", True)
              and (r.get("platform") == "iOS" or ".iOS-" in r.get("identifier", ""))
          ]
          if not runtimes:
              raise SystemExit("No available iOS simulator runtimes are installed")

          runtimes.sort(key=version_key)
          print(runtimes[-1]["identifier"])
          PY
          )"
          UDID="$(xcrun simctl create "Mindees iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID")"
          echo "Created simulator $UDID ($DEVICE_TYPE_ID / $RUNTIME_ID)"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      # Run the UIKit render tests on an iOS Simulator — proves the command stream
      # renders into a correct, real UIView hierarchy (Phase 8E).
      - name: Render test on iOS Simulator
        run: xcodebuild test -scheme MindeesNativeHost -destination 'platform=iOS Simulator,id=${{ steps.ios-simulator.outputs.udid }}' -skipPackagePluginValidation
