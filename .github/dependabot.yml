version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot bumps the SHA and
  # updates the trailing version comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # npm dependencies across the workspace. Grouped to keep PR noise low.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      dev-dependencies:
        dependency-type: development
